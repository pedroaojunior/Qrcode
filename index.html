<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Controle de Almoço</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f9;text-align:center;margin:0;padding:20px}
h2{margin-top:10px}
#reader{max-width:420px;margin:20px auto;border:3px solid #333;border-radius:12px;overflow:hidden;display:none}
button{padding:14px 20px;border:none;border-radius:8px;font-size:18px;color:#fff;cursor:pointer;width:100%;max-width:420px;margin:8px auto;display:block}
#btn-iniciar{background:#28a745}
#resultado{display:none;padding:16px;border-radius:8px;font-weight:bold;font-size:20px;margin:20px auto;max-width:420px}
.sucesso{background:#d4edda;color:#155724}
.erro{background:#f8d7da;color:#721c24}
.processando{background:#fff3cd;color:#856404}
</style>
</head>
<body>
<h2>Controle de Almoço 🍽️</h2>
<p>Aproxime o QR Code do funcionário.</p>

<button id="btn-iniciar">📷 LIGAR CÂMERA</button>
<div id="reader"></div>
<div id="resultado"></div>

<script>
const URL_WEBHOOK_POST = "https://coldbloodedopossum-n8n.cloudfy.live/webhook/validar-qr";
let html5Qr=null;
let lendo=false;

const resultado=document.getElementById("resultado");

function mostrar(msg,classe){
 resultado.className=classe;
 resultado.style.display="block";
 resultado.innerText=msg;
}

async function iniciarCamera(){
 if(html5Qr) return;
 document.getElementById("btn-iniciar").style.display="none";
 document.getElementById("reader").style.display="block";

 html5Qr=new Html5Qrcode("reader");

 let cameraConfig={facingMode:"environment"};

 try{
   const cams=await Html5Qrcode.getCameras();
   if(cams.length){
      const traseira=cams.find(c=>/back|rear|traseira|environment/i.test(c.label));
      cameraConfig=traseira?{deviceId:{exact:traseira.id}}:{deviceId:{exact:cams[cams.length-1].id}};
   }
 }catch(e){}

 await html5Qr.start(
   cameraConfig,
   {fps:20,qrbox:{width:260,height:260},rememberLastUsedCamera:true},
   onScan,
   ()=>{}
 ).catch(e=>{
   alert("Não foi possível abrir a câmera: "+e);
   document.getElementById("btn-iniciar").style.display="block";
   html5Qr=null;
 });
}

async function onScan(text){
 if(lendo) return;
 lendo=true;
 try{await html5Qr.stop();}catch(e){}
 try{await html5Qr.clear();}catch(e){}
 html5Qr=null;
 document.getElementById("reader").style.display="none";
 enviar(text);
}

async function enviar(codigo){
 mostrar("Validando crachá...","processando");
 try{
   const r=await fetch(URL_WEBHOOK_POST,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({codigo:codigo})
   });
   if(!r.ok) throw new Error();
   const data=await r.json();

   if(data.status==="liberado"||data.liberado===true){
      mostrar("✅ ALMOÇO LIBERADO!","sucesso");
      if(navigator.vibrate) navigator.vibrate(150);
   }else{
      mostrar("❌ BLOQUEADO: "+(data.mensagem||"Já almoçou"),"erro");
      if(navigator.vibrate) navigator.vibrate([120,80,120]);
   }
 }catch(e){
    mostrar("🔺 Erro de comunicação com o sistema.","erro");
 }
 setTimeout(reiniciar,2000);
}

function reiniciar(){
 lendo=false;
 resultado.style.display="none";
 iniciarCamera();
}

document.getElementById("btn-iniciar").addEventListener("click",iniciarCamera);
</script>
</body>
</html>
